version: '3.9'

services:
  worker:
    build: .
    container_name: dukaos-worker
    restart: unless-stopped
    ports:
      - '127.0.0.1:3001:3001'
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
